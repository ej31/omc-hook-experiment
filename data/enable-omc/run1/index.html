<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마크다운 에디터</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- 헤더 -->
    <header id="header">
      <h1>
        <span class="logo-icon">📝</span>
        마크다운 에디터
      </h1>
      <div style="display: flex; align-items: center; gap: 16px;">
        <span id="save-status" class="saved">저장됨</span>
        <span id="word-count"></span>
      </div>
    </header>

    <!-- 툴바 -->
    <div id="toolbar" role="toolbar" aria-label="마크다운 서식 도구">

      <!-- 텍스트 서식 -->
      <div class="toolbar-group">
        <button class="toolbar-btn bold" data-action="bold" title="굵게 (Ctrl+B)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
            <path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/>
            <path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/>
          </svg>
          <span>Bold</span>
        </button>
        <button class="toolbar-btn" data-action="italic" title="기울임 (Ctrl+I)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
            <line x1="19" y1="4" x2="10" y2="4"/>
            <line x1="14" y1="20" x2="5" y2="20"/>
            <line x1="15" y1="4" x2="9" y2="20"/>
          </svg>
          <span>Italic</span>
        </button>
      </div>

      <div class="toolbar-separator"></div>

      <!-- 제목 -->
      <div class="toolbar-group">
        <button class="toolbar-btn" data-action="heading1" title="제목 1">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
            <path d="M4 12h16"/><path d="M4 6v12"/><path d="M12 6v12"/>
          </svg>
          <span>H1</span>
        </button>
        <button class="toolbar-btn" data-action="heading2" title="제목 2">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
            <path d="M4 12h16"/><path d="M4 6v12"/><path d="M12 6v12"/>
          </svg>
          <span>H2</span>
        </button>
        <button class="toolbar-btn" data-action="heading3" title="제목 3">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
            <path d="M4 12h16"/><path d="M4 6v12"/><path d="M12 6v12"/>
          </svg>
          <span>H3</span>
        </button>
      </div>

      <div class="toolbar-separator"></div>

      <!-- 링크 / 이미지 -->
      <div class="toolbar-group">
        <button class="toolbar-btn" data-action="link" title="링크 삽입 (Ctrl+K)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
          <span>Link</span>
        </button>
        <button class="toolbar-btn" data-action="image" title="이미지 삽입">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <span>Image</span>
        </button>
      </div>

      <div class="toolbar-separator"></div>

      <!-- 코드 -->
      <div class="toolbar-group">
        <button class="toolbar-btn" data-action="code" title="인라인 코드">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
            <polyline points="16 18 22 12 16 6"/>
            <polyline points="8 6 2 12 8 18"/>
          </svg>
          <span>Code</span>
        </button>
        <button class="toolbar-btn" data-action="codeblock" title="코드 블록">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
            <rect x="2" y="3" width="20" height="18" rx="2"/>
            <line x1="2" y1="9" x2="22" y2="9"/>
            <path d="m9 15 2 2 4-4"/>
          </svg>
          <span>Block</span>
        </button>
      </div>

      <div class="toolbar-separator"></div>

      <!-- 목록 -->
      <div class="toolbar-group">
        <button class="toolbar-btn" data-action="unordered" title="비순서 목록">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
            <line x1="9" y1="6" x2="20" y2="6"/>
            <line x1="9" y1="12" x2="20" y2="12"/>
            <line x1="9" y1="18" x2="20" y2="18"/>
            <circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none"/>
            <circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/>
            <circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"/>
          </svg>
          <span>UL</span>
        </button>
        <button class="toolbar-btn" data-action="ordered" title="순서 목록">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
            <line x1="10" y1="6" x2="21" y2="6"/>
            <line x1="10" y1="12" x2="21" y2="12"/>
            <line x1="10" y1="18" x2="21" y2="18"/>
            <path d="M4 6h1v4" stroke="currentColor" stroke-width="1.5"/>
            <path d="M4 10h2" stroke="currentColor" stroke-width="1.5"/>
            <path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          <span>OL</span>
        </button>
      </div>

      <div class="toolbar-separator"></div>

      <!-- 기타 -->
      <div class="toolbar-group">
        <button class="toolbar-btn" data-action="blockquote" title="인용문">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
            <path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/>
            <path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/>
          </svg>
          <span>Quote</span>
        </button>
        <button class="toolbar-btn" data-action="hr" title="수평선">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
            <line x1="2" y1="12" x2="22" y2="12" stroke-width="2"/>
          </svg>
          <span>HR</span>
        </button>
      </div>

      <!-- Export 버튼 (우측 정렬) -->
      <button id="export-btn" title="HTML 파일로 다운로드">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Export HTML
      </button>
    </div>

    <!-- 에디터 / 미리보기 분할 영역 -->
    <div id="editor-container">

      <!-- 에디터 패널 -->
      <div id="editor-pane" class="pane">
        <div class="pane-header">
          <span class="status-dot"></span>
          <span>편집기</span>
        </div>
        <textarea
          id="editor"
          spellcheck="false"
          autocorrect="off"
          autocapitalize="off"
          placeholder="마크다운을 입력하세요...

# 제목
**굵게**, *기울임*
- 목록 항목
> 인용문
\`\`\`code\`\`\`"
        ></textarea>
      </div>

      <!-- 드래그 리사이저 -->
      <div id="resizer" role="separator" aria-label="창 크기 조정" title="드래그하여 크기 조정 / 더블클릭으로 초기화" tabindex="0" aria-valuenow="50" aria-valuemin="10" aria-valuemax="90"></div>

      <!-- 미리보기 패널 -->
      <div id="preview-pane" class="pane">
        <div class="pane-header">
          <span>미리보기</span>
        </div>
        <div id="preview" class="markdown-body" aria-live="polite" aria-label="마크다운 미리보기">
          <div id="preview-empty">
            <div class="empty-icon">📄</div>
            <p>왼쪽에 마크다운을 입력하면<br>여기에 미리보기가 표시됩니다</p>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- 토스트 알림 -->
  <div id="toast" role="alert" aria-live="polite"></div>

  <!-- 스크립트 -->
  <script src="markdown-parser.js"></script>
  <script src="editor.js"></script>
</body>
</html>
