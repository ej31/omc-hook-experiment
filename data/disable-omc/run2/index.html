<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Editor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-wrapper">

    <!-- 헤더 -->
    <header class="app-header">
      <div class="app-title">
        <span class="app-logo">MD</span>
        <span>Markdown Editor</span>
      </div>
      <button id="export-btn" class="export-btn" title="HTML 파일로 내보내기">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span>Export HTML</span>
      </button>
    </header>

    <!-- 툴바 -->
    <div id="toolbar" class="toolbar">

      <!-- 텍스트 강조 -->
      <div class="toolbar-group">
        <button class="toolbar-btn" data-action="bold" title="굵게 (Ctrl+B)">
          B
        </button>
        <button class="toolbar-btn" data-action="italic" title="이탤릭 (Ctrl+I)">
          I
        </button>
      </div>

      <span class="toolbar-sep"></span>

      <!-- 제목 -->
      <div class="toolbar-group">
        <button class="toolbar-btn" data-action="h1" title="제목 1 (H1)">H1</button>
        <button class="toolbar-btn" data-action="h2" title="제목 2 (H2)">H2</button>
        <button class="toolbar-btn" data-action="h3" title="제목 3 (H3)">H3</button>
      </div>

      <span class="toolbar-sep"></span>

      <!-- 링크 & 이미지 -->
      <div class="toolbar-group">
        <button class="toolbar-btn" data-action="link" title="링크 삽입 (Ctrl+K)" aria-label="링크 삽입">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
        </button>
        <button class="toolbar-btn" data-action="image" title="이미지 삽입" aria-label="이미지 삽입">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </button>
      </div>

      <span class="toolbar-sep"></span>

      <!-- 코드 & 리스트 -->
      <div class="toolbar-group">
        <button class="toolbar-btn" data-action="code" title="코드 블록 삽입" aria-label="코드 블록 삽입">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="16 18 22 12 16 6"/>
            <polyline points="8 6 2 12 8 18"/>
          </svg>
        </button>
        <button class="toolbar-btn" data-action="ul" title="비순서 목록" aria-label="비순서 목록">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="9" y1="6" x2="20" y2="6"/>
            <line x1="9" y1="12" x2="20" y2="12"/>
            <line x1="9" y1="18" x2="20" y2="18"/>
            <circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none"/>
            <circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/>
            <circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"/>
          </svg>
        </button>
        <button class="toolbar-btn" data-action="ol" title="순서 목록" aria-label="순서 목록">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="10" y1="6" x2="21" y2="6"/>
            <line x1="10" y1="12" x2="21" y2="12"/>
            <line x1="10" y1="18" x2="21" y2="18"/>
            <path d="M4 6h1v4" stroke="currentColor" stroke-width="1.8" fill="none"/>
            <path d="M4 10h2" stroke="currentColor" stroke-width="1.8"/>
            <path d="M3 14h2a1 1 0 0 1 0 2H3a1 1 0 0 0 0 2h2" stroke="currentColor" stroke-width="1.8" fill="none"/>
          </svg>
        </button>
      </div>

      <span class="toolbar-sep"></span>

      <!-- 인용 & 수평선 -->
      <div class="toolbar-group">
        <button class="toolbar-btn" data-action="blockquote" title="인용 블록" aria-label="인용 블록">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/>
            <path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/>
          </svg>
        </button>
        <button class="toolbar-btn" data-action="hr" title="수평선" aria-label="수평선 삽입">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="8" x2="7" y2="8"/>
            <line x1="17" y1="8" x2="21" y2="8"/>
            <line x1="3" y1="16" x2="7" y2="16"/>
            <line x1="17" y1="16" x2="21" y2="16"/>
          </svg>
        </button>
      </div>

    </div><!-- /#toolbar -->

    <!-- 분할 패널 -->
    <div class="editor-container">
      <div id="editor-pane" class="editor-pane">
        <div class="pane-label">편집기</div>
        <textarea
          id="editor"
          spellcheck="false"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          placeholder="마크다운을 입력하세요..."
        ></textarea>
      </div>

      <div id="resizer" class="resizer" role="separator" aria-orientation="vertical" aria-label="패널 크기 조절" tabindex="0" aria-valuenow="50" aria-valuemin="15" aria-valuemax="85"></div>

      <div id="preview-pane" class="preview-pane">
        <div class="pane-label">미리보기</div>
        <div id="preview" class="markdown-body"></div>
      </div>
    </div>

  </div><!-- /.app-wrapper -->

  <script src="markdown-parser.js"></script>
  <script src="editor.js"></script>
</body>
</html>
