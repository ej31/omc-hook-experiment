<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Editor</title>
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'self'; style-src 'self'; img-src * data:; font-src 'self';">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="toolbar">
      <div class="toolbar-group">
        <button class="toolbar-btn" data-action="bold" title="굵게 (Ctrl+B)" aria-label="굵게">
          <span class="icon">B</span>
        </button>
        <button class="toolbar-btn" data-action="italic" title="기울임 (Ctrl+I)" aria-label="기울임">
          <span class="icon italic-icon">I</span>
        </button>
        <button class="toolbar-btn" data-action="bold-italic" title="굵은 기울임" aria-label="굵은 기울임">
          <span class="icon bold-italic-icon">BI</span>
        </button>
      </div>
      <div class="toolbar-divider" role="separator"></div>
      <div class="toolbar-group">
        <button class="toolbar-btn" data-action="h1" title="제목 1" aria-label="제목 1">H1</button>
        <button class="toolbar-btn" data-action="h2" title="제목 2" aria-label="제목 2">H2</button>
        <button class="toolbar-btn" data-action="h3" title="제목 3" aria-label="제목 3">H3</button>
      </div>
      <div class="toolbar-divider" role="separator"></div>
      <div class="toolbar-group">
        <button class="toolbar-btn" data-action="link" title="링크 (Ctrl+K)" aria-label="링크">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        </button>
        <button class="toolbar-btn" data-action="image" title="이미지" aria-label="이미지">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </button>
      </div>
      <div class="toolbar-divider" role="separator"></div>
      <div class="toolbar-group">
        <button class="toolbar-btn" data-action="code" title="인라인 코드" aria-label="인라인 코드">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        </button>
        <button class="toolbar-btn" data-action="codeblock" title="코드 블록" aria-label="코드 블록">
          <span class="icon" aria-hidden="true">{ }</span>
        </button>
      </div>
      <div class="toolbar-divider" role="separator"></div>
      <div class="toolbar-group">
        <button class="toolbar-btn" data-action="ul" title="순서 없는 목록" aria-label="순서 없는 목록">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        </button>
        <button class="toolbar-btn" data-action="ol" title="순서 있는 목록" aria-label="순서 있는 목록">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4"/><path d="M4 10h2"/><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/></svg>
        </button>
        <button class="toolbar-btn" data-action="blockquote" title="인용구" aria-label="인용구">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/><path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/></svg>
        </button>
        <button class="toolbar-btn" data-action="hr" title="수평선" aria-label="수평선">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
      <div class="toolbar-spacer"></div>
      <div class="toolbar-group">
        <button class="toolbar-btn export-btn" id="export-btn" title="HTML로 내보내기">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span>HTML 내보내기</span>
        </button>
      </div>
    </header>

    <div class="editor-container">
      <div class="pane editor-pane" id="editor-pane">
        <div class="pane-header">
          <span class="pane-title">편집기</span>
          <span class="auto-save-indicator" id="auto-save-indicator">자동 저장됨</span>
        </div>
        <textarea
          id="editor"
          class="editor-textarea"
          placeholder="여기에 마크다운을 입력하세요..."
          spellcheck="false"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
        ></textarea>
      </div>

      <div class="resizer" id="resizer" title="드래그하여 크기 조절"></div>

      <div class="pane preview-pane" id="preview-pane">
        <div class="pane-header">
          <span class="pane-title">미리보기</span>
        </div>
        <div id="preview" class="preview-content markdown-body"></div>
      </div>
    </div>
  </div>

  <script src="markdown-parser.js"></script>
  <script src="editor.js"></script>
</body>
</html>
