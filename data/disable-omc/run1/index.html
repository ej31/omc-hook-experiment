<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Editor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <!-- 툴바 -->
    <header class="toolbar">
      <div class="toolbar-left">
        <span class="app-title">Markdown Editor</span>

        <div class="toolbar-buttons">

          <!-- 제목 -->
          <div class="toolbar-group">
            <button class="toolbar-btn" data-action="h1" title="제목 1 (H1)">H1</button>
            <button class="toolbar-btn" data-action="h2" title="제목 2 (H2)">H2</button>
            <button class="toolbar-btn" data-action="h3" title="제목 3 (H3)">H3</button>
          </div>

          <div class="toolbar-separator"></div>

          <!-- 텍스트 서식 -->
          <div class="toolbar-group">
            <button class="toolbar-btn" data-action="bold" title="굵게 (Ctrl+B)"><strong>B</strong></button>
            <button class="toolbar-btn" data-action="italic" title="기울임 (Ctrl+I)"><em>I</em></button>
          </div>

          <div class="toolbar-separator"></div>

          <!-- 삽입 -->
          <div class="toolbar-group">
            <button class="toolbar-btn" data-action="link" title="링크 (Ctrl+K)">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
                <path d="M7.775 3.275a.75.75 0 001.06 1.06l1.25-1.25a2 2 0 112.83 2.83l-2.5 2.5a2 2 0 01-2.83 0 .75.75 0 00-1.06 1.06 3.5 3.5 0 004.95 0l2.5-2.5a3.5 3.5 0 00-4.95-4.95l-1.25 1.25zm-4.69 9.64a2 2 0 010-2.83l2.5-2.5a2 2 0 012.83 0 .75.75 0 001.06-1.06 3.5 3.5 0 00-4.95 0l-2.5 2.5a3.5 3.5 0 004.95 4.95l1.25-1.25a.75.75 0 00-1.06-1.06l-1.25 1.25a2 2 0 01-2.83 0z"/>
              </svg>
            </button>
            <button class="toolbar-btn" data-action="image" title="이미지 삽입">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
                <path fill-rule="evenodd" d="M1.75 2.5a.25.25 0 00-.25.25v10.5c0 .138.112.25.25.25h.94a.76.76 0 01.03-.03l6.077-6.078a1.75 1.75 0 012.412-.06L14.5 10.31V2.75a.25.25 0 00-.25-.25H1.75zM0 2.75C0 1.784.784 1 1.75 1h12.5c.966 0 1.75.784 1.75 1.75v10.5A1.75 1.75 0 0114.25 15H1.75A1.75 1.75 0 010 13.25V2.75zm9.878 6.287l-3.838 3.838-.03.03H14.25a.25.25 0 00.25-.25v-.959l-3.372-3.028a.25.25 0 00-.344.009L9.878 9.037zm-4.096 4.178L9.26 8.557l-.001-.001-1.559-1.4a.25.25 0 00-.345.009L3.5 11.02v1.98h2.282zM5 6a1 1 0 11-2 0 1 1 0 012 0z"/>
              </svg>
            </button>
            <button class="toolbar-btn" data-action="code" title="코드 블록">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
                <path fill-rule="evenodd" d="M4.72 3.22a.75.75 0 011.06 1.06L2.06 8l3.72 3.72a.75.75 0 11-1.06 1.06L.47 8.53a.75.75 0 010-1.06l4.25-4.25zm6.56 0a.75.75 0 10-1.06 1.06L13.94 8l-3.72 3.72a.75.75 0 101.06 1.06l4.25-4.25a.75.75 0 000-1.06l-4.25-4.25z"/>
              </svg>
            </button>
          </div>

          <div class="toolbar-separator"></div>

          <!-- 목록 & 블록 -->
          <div class="toolbar-group">
            <button class="toolbar-btn" data-action="ul" title="비순서 목록">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
                <path fill-rule="evenodd" d="M2 4a1 1 0 100-2 1 1 0 000 2zm3.75-1.5a.75.75 0 000 1.5h8.5a.75.75 0 000-1.5h-8.5zm0 5a.75.75 0 000 1.5h8.5a.75.75 0 000-1.5h-8.5zm0 5a.75.75 0 000 1.5h8.5a.75.75 0 000-1.5h-8.5zM3 8a1 1 0 11-2 0 1 1 0 012 0zm-1 6a1 1 0 100-2 1 1 0 000 2z"/>
              </svg>
            </button>
            <button class="toolbar-btn" data-action="ol" title="순서 목록">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
                <path fill-rule="evenodd" d="M5 3.25a.75.75 0 01.75-.75h8.5a.75.75 0 010 1.5h-8.5A.75.75 0 015 3.25zm0 5a.75.75 0 01.75-.75h8.5a.75.75 0 010 1.5h-8.5A.75.75 0 015 8.25zm0 5a.75.75 0 01.75-.75h8.5a.75.75 0 010 1.5h-8.5a.75.75 0 01-.75-.75zM1.5 2.5h1v4H1.5V2.5zM1 7.5h2v1H1v1h2v.5H1v1h3V6H1v1.5zm1 5.063V14H1v-1h.5v-.438H1v-1h2v4H1v-1h1v-.5H1V13h1v-.438z"/>
              </svg>
            </button>
            <button class="toolbar-btn" data-action="blockquote" title="인용구">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
                <path fill-rule="evenodd" d="M1.75 2.5a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h2a.75.75 0 01.75.75v2.19l2.72-2.72a.75.75 0 01.53-.22h6.5a.25.25 0 00.25-.25v-7.5a.25.25 0 00-.25-.25H1.75zM0 2.75C0 1.784.784 1 1.75 1h12.5c.966 0 1.75.784 1.75 1.75v7.5A1.75 1.75 0 0114.25 12H8.56l-3.22 3.22A.75.75 0 014 14.75V12H1.75A1.75 1.75 0 010 10.25v-7.5z"/>
              </svg>
            </button>
            <button class="toolbar-btn" data-action="hr" title="수평선">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
                <path fill-rule="evenodd" d="M0 7.75A.75.75 0 01.75 7h14.5a.75.75 0 010 1.5H.75A.75.75 0 010 7.75z"/>
              </svg>
            </button>
          </div>

        </div>
      </div>

      <div class="toolbar-right">
        <button class="export-btn" id="exportBtn">HTML 내보내기</button>
      </div>
    </header>

    <!-- 에디터 + 미리보기 분할 창 -->
    <main class="editor-container">

      <div class="pane editor-pane" id="editorPane">
        <div class="pane-header">Markdown</div>
        <textarea
          id="editor"
          spellcheck="false"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          placeholder="마크다운을 입력하세요..."
        ></textarea>
      </div>

      <div class="resizer" id="resizer" title="드래그하여 크기 조절"></div>

      <div class="pane preview-pane" id="previewPane">
        <div class="pane-header">미리보기</div>
        <div id="preview" class="markdown-body"></div>
      </div>

    </main>
  </div>

  <script src="markdown-parser.js"></script>
  <script src="editor.js"></script>
</body>
</html>
